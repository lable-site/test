<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURUM | ELITE MUSIC LABEL</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;600;800;900&display=swap');

        :root {
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --blur: 50px;
            --accent: #fff;
            --transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        /* КРУТОЙ КАНВАС НА ФОНЕ */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.6;
        }

        /* КНОПКА В УГЛУ */
        .header-action {
            position: fixed;
            top: 30px; right: 30px;
            z-index: 1000;
        }
        .btn-contact {
            padding: 12px 24px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            color: #fff;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 2px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-contact:hover { background: #fff; color: #000; transform: scale(1.05); }

        /* МОДАЛЬНОЕ ОКНО */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            display: none; align-items: center; justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .modal-content {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 50px;
            border-radius: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .modal-content h2 { margin-bottom: 20px; font-weight: 800; letter-spacing: 2px; }
        .modal-content p { font-weight: 200; opacity: 0.7; margin-bottom: 30px; line-height: 1.6; }
        .close-modal { 
            margin-top: 20px; cursor: pointer; opacity: 0.5; font-size: 12px; text-transform: uppercase; letter-spacing: 2px;
        }

        /* HERO */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-title { 
            font-size: clamp(40px, 8vw, 80px); 
            font-weight: 900; letter-spacing: 25px; 
            text-transform: uppercase; text-indent: 25px;
            opacity: 0; transform: translateY(20px); animation: fadeInUp 1.5s forwards 0.5s;
        }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        /* SECTION REVEAL */
        .section { padding: 100px 20px; max-width: 1400px; margin: 0 auto; opacity: 0; transform: translateY(30px); transition: 1s ease-out; }
        .section.active { opacity: 1; transform: translateY(0); }

        /* ARTISTS SLIDER */
        .swiper { width: 100%; padding: 50px 0 100px; }
        .swiper-slide { width: auto; }
        .artist-card {
            width: 320px; height: 480px;
            border-radius: 40px; overflow: hidden; position: relative;
            background: var(--glass); border: 1px solid var(--glass-border);
            backdrop-filter: blur(var(--blur));
            transition: var(--transition);
        }
        .artist-photo { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) brightness(0.5); transition: 0.8s ease; }
        .artist-info {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            z-index: 2;
        }
        .artist-name { font-size: 20px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        
        .swiper-slide-active .artist-card { transform: scale(1.05); border-color: rgba(255,255,255,0.3); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .swiper-slide-active .artist-photo { filter: grayscale(0) brightness(1); }

        /* СТРЕЛКИ НАВИГАЦИИ */
        .nav-container { display: flex; justify-content: center; gap: 20px; margin-top: -30px; }
        .nav-btn {
            width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; transition: 0.3s;
        }
        .nav-btn:hover { background: #fff; color: #000; }

        /* PARTNERS MARQUEE (БЕГУЩАЯ СТРОКА) */
        .partners-marquee {
            overflow: hidden; display: flex; gap: 80px; padding: 40px 0;
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }
        .marquee-track { display: flex; gap: 80px; animation: scroll 20s linear infinite; }
        .marquee-track img { height: 40px; filter: grayscale(1) invert(1) opacity(0.5); }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="header-action">
        <button class="btn-contact" onclick="toggleModal(true)">Contact Label</button>
    </div>

    <div class="modal-overlay" id="contactModal">
        <div class="modal-content">
            <h2>DEMO DROP</h2>
            <p>Мы ищем таланты. Присылай ссылку на Soundcloud или облако. Если это жир — мы перезвоним.</p>
            <a href="mailto:demo@aurum.label" class="btn-contact" style="display: block; text-decoration: none;">Send Track</a>
            <div class="close-modal" onclick="toggleModal(false)">[ close ]</div>
        </div>
    </div>

    <section class="hero">
        <h1 class="hero-title">AURUM</h1>
    </section>

    <section class="section">
        <div style="text-align: center; max-width: 800px; margin: 0 auto; font-size: 24px; font-weight: 200; line-height: 1.6;">
            <span style="font-weight: 800;">AURUM</span> — это концентрация звука и визуальной культуры. Мы не штампуем контент, мы создаем иконы.
        </div>
    </section>

    <section class="section">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <div class="artist-card">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d6/T-Fest_%E2%80%94_official_press_photo_%E2%80%94_2025_%E2%80%94_by_manager.jpg" class="artist-photo">
                        <div class="artist-info"><div class="artist-name">T-FEST</div></div>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="artist-card">
                        <img src="https://designer.kz/wp-content/uploads/2024/06/Skryptonite.webp" class="artist-photo">
                        <div class="artist-info"><div class="artist-name">СКРИПТОНИТ</div></div>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="artist-card">
                        <img src="https://avatars.yandex.net/get-music-content/16464214/8bceb93a.p.24009925/m1000x1000" class="artist-photo">
                        <div class="artist-info"><div class="artist-name">FRIENDLY THUG 52</div></div>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="artist-card">
                        <img src="https://obs-image-service-mz.obs.ru-moscow-1.hc.sbercloud.ru/44f207c7-2160-40ca-b127-c7180d010354" class="artist-photo">
                        <div class="artist-info"><div class="artist-name">MACAN</div></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="nav-container">
            <div class="nav-btn swiper-prev"><i class="fa-solid fa-chevron-left"></i></div>
            <div class="nav-btn swiper-next"><i class="fa-solid fa-chevron-right"></i></div>
        </div>
    </section>

    <section class="section">
        <div class="partners-marquee">
            <div class="marquee-track">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/61/Zvonko_Digital_Logo.svg/1280px-Zvonko_Digital_Logo.svg.png">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/VK_Music_Full_Logo.svg/1280px-VK_Music_Full_Logo.svg.png">
                <img src="https://img.ixbt.site/live/topics/preview/00/07/95/94/a6ff0bfe41.png">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/61/Zvonko_Digital_Logo.svg/1280px-Zvonko_Digital_Logo.svg.png">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/VK_Music_Full_Logo.svg/1280px-VK_Music_Full_Logo.svg.png">
                <img src="https://img.ixbt.site/live/topics/preview/00/07/95/94/a6ff0bfe41.png">
            </div>
        </div>
    </section>

    <footer style="padding: 100px 20px; text-align: center; border-top: 1px solid var(--glass-border);">
        <p style="font-size: 10px; letter-spacing: 5px; opacity: 0.3;">© 2026 AURUM WORLDWIDE</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        /* CANVAS BACKGROUND ANIMATION */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let points = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        for(let i = 0; i < 5; i++) {
            points.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                size: Math.random() * 300 + 200,
                color: i % 2 === 0 ? '#ffffff' : '#444444'
            });
        }

        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            points.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        /* SWIPER CONFIG */
        const swiper = new Swiper(".mySwiper", {
            effect: "coverflow",
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: "auto",
            speed: 1000,
            mousewheel: { sensitivity: 1 },
            navigation: { nextEl: ".swiper-next", prevEl: ".swiper-prev" },
            coverflowEffect: { rotate: 5, stretch: 0, depth: 150, modifier: 2, slideShadows: false },
            loop: true,
        });

        /* MODAL LOGIC */
        function toggleModal(show) {
            document.getElementById('contactModal').style.display = show ? 'flex' : 'none';
        }

        /* REVEAL ON SCROLL */
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.section').forEach(s => observer.observe(s));
    </script>
</body>
</html>
