<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOALA MUSIC — Музыкальный лейбл</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Сброс базовых стилей, чтобы нигде не вылезали белые полосы */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Raleway', sans-serif;
            background-color: #000; /* Глубокий черный фон */
            color: #fff;
            overflow-x: hidden;
        }

        /* 1. ИДЕАЛЬНОЕ СТЕКЛО (Glassmorphism) ДЛЯ ШАПКИ */
        .glass-header {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 1000;
            
            /* Та самая магия стекла */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        .glass-header .logo {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 1px;
            color: #fff;
            text-decoration: none;
        }

        .glass-header nav {
            display: flex;
            gap: 30px;
        }

        .glass-header nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .glass-header nav a:hover {
            color: #5bee44; /* Твой кислотно-зеленый акцент при наведении */
        }

        /* 2. ГЛАВНЫЙ ЭКРАН (HERO) С 3D */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Контейнер для 3D из Spline */
        .spline-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .spline-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Текст поверх 3D */
        .hero-title {
            position: relative;
            z-index: 2; /* Текст выше 3D модели */
            font-size: 8vw;
            font-weight: 700;
            text-align: center;
            line-height: 0.9;
            letter-spacing: -2px;
            pointer-events: none; /* Чтобы мышка проходила сквозь текст и крутила 3D */
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); /* Тень для читаемости */
        }

        /* Временный блок, чтобы было куда скроллить вниз */
        .spacer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #5bee44;
        }
    </style>
</head>
<body>

    <header class="glass-header">
        <a href="#" class="logo">KOALA</a>
        <nav>
            <a href="#about">О нас</a>
            <a href="#artists">Артисты</a>
            <a href="#freshmen">Freshmen 2025</a>
            <a href="#contacts">Контакты</a>
        </nav>
    </header>

    <section class="hero">
        <div class="spline-container">
            <iframe src="https://my.spline.design/untitled-aa4691f544b9c039811cdb নিরাপদe2868378/" frameborder="0"></iframe>
        </div>
        <h1 class="hero-title">KOALA<br>MUSIC</h1>
    </section>

    <section class="spacer" id="artists">
        Здесь будет ахуевшая карусель артистов
    </section>

    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script>
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), // Плавность как на дорогих сайтах
            smooth: true,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
    </script>

</body>
</html>
