<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURUM | PREMIUM INTERFACE</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700;900&family=Raleway:wght@300;700;900&display=swap');

        :root {
            --bg: #000000;
            --accent: #fff;
            --green: #5bee44;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* ОБНУЛЕНИЕ */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        
        body { background: var(--bg); color: #fff; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* 1. HEADER */
        header {
            position: fixed; top: 0; width: 100%; padding: 25px 40px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .logo { font-family: 'Raleway', sans-serif; font-weight: 900; font-size: 22px; letter-spacing: 5px; }
        
        .btn-demo {
            background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border); padding: 12px 24px; border-radius: 100px;
            color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .btn-demo:hover { background: #fff; color: #000; }

        /* 2. HERO */
        .hero {
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
        }
        .hero h1 { 
            font-family: 'Raleway', sans-serif; font-size: clamp(50px, 15vw, 150px); 
            font-weight: 900; letter-spacing: -2px; line-height: 0.9; margin-bottom: 20px;
        }
        .hero p { max-width: 600px; font-weight: 200; font-size: clamp(16px, 2vw, 20px); opacity: 0.5; line-height: 1.6; padding: 0 20px; }

        /* 3. SECTION TITLES */
        .section-label {
            padding: 100px 5% 30px; font-family: 'Raleway', sans-serif;
            font-size: clamp(30px, 6vw, 60px); font-weight: 900; text-transform: uppercase;
        }

        /* 4. СЛАЙДЕР АРТИСТОВ (FREE MODE) */
        .swiper { width: 100%; padding: 20px 5%; overflow: visible !important; }
        .swiper-slide { width: 320px; transition: 0.4s ease; }
        
        .artist-card {
            width: 100%; height: 460px; border-radius: 15px; overflow: hidden;
            position: relative; background: #111; border: 1px solid var(--border);
            transform: translateZ(0); will-change: transform;
        }
        .artist-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.6s ease; }
        
        /* Плотный градиент для читаемости ников */
        .artist-info {
            position: absolute; bottom: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 30px; z-index: 5;
        }
        .artist-name { font-weight: 900; font-size: 24px; letter-spacing: 1px; text-transform: uppercase; }
        .artist-card:hover .artist-img { filter: grayscale(0) scale(1.05); }

        /* НАВИГАЦИЯ */
        .nav-wrap { display: flex; gap: 15px; padding: 30px 5%; }
        .n-btn {
            width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
        }
        .n-btn:hover { background: #fff; color: #000; }

        /* 5. ПАРТНЕРЫ (MARQUEE С РАЗМЫТИЕМ КРАЕВ) */
        .marquee-container {
            width: 100%; overflow: hidden; padding: 60px 0;
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }
        .marquee-track { display: flex; width: max-content; animation: scroll 25s linear infinite; }
        .marquee-track img { height: 45px; margin: 0 50px; object-fit: contain; }

        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* 6. МОДАЛКА (FIXED) */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #0a0a0a; border: 1px solid var(--border); padding: 40px 20px;
            border-radius: 20px; width: 100%; max-width: 400px; text-align: center;
        }
        .modal-content h2 { font-size: 28px; font-weight: 900; margin-bottom: 10px; }
        .modal-content p { font-size: 14px; opacity: 0.5; margin-bottom: 30px; line-height: 1.5; }

        footer { padding: 60px 5%; opacity: 0.3; font-size: 12px; letter-spacing: 2px; }

    </style>
</head>
<body>

    <header>
        <div class="logo">AURUM</div>
        <button class="btn-demo" onclick="document.getElementById('m').classList.add('active')">Send Demo</button>
    </header>

    <div class="modal" id="m">
        <div class="modal-content">
            <h2>DEMO DROP</h2>
            <p>Мы ищем артистов с уникальным видением. Присылай ссылку на свой материал (SC/Drive).</p>
            <a href="mailto:demo@aurum.music" class="btn-demo" style="display:inline-block; text-decoration:none;">Email Us</a>
            <p onclick="document.getElementById('m').classList.remove('active')" style="margin-top:30px; cursor:pointer; font-size:10px; letter-spacing:1px;">[ CLOSE ]</p>
        </div>
    </div>

    <section class="hero">
        <h1>AURUM<br>MUSIC</h1>
        <p>Независимое музыкальное объединение. <br> Мы создаем историю звука.</p>
    </section>

    <h2 class="section-label">Artists</h2>
    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <div class="artist-card">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d6/T-Fest_%E2%80%94_official_press_photo_%E2%80%94_2025_%E2%80%94_by_manager.jpg" class="artist-img">
                    <div class="artist-info"><div class="artist-name">T-FEST</div></div>
                </div>
            </div>
            <div class="swiper-slide">
                <div class="artist-card">
                    <img src="https://designer.kz/wp-content/uploads/2024/06/Skryptonite.webp" class="artist-img">
                    <div class="artist-info"><div class="artist-name">СКРИПТОНИТ</div></div>
                </div>
            </div>
            <div class="swiper-slide">
                <div class="artist-card">
                    <img src="https://avatars.yandex.net/get-music-content/16464214/8bceb93a.p.24009925/m1000x1000" class="artist-img">
                    <div class="artist-info"><div class="artist-name">BULAVIN</div></div>
                </div>
            </div>
            <div class="swiper-slide">
                <div class="artist-card">
                    <img src="https://obs-image-service-mz.obs.ru-moscow-1.hc.sbercloud.ru/44f207c7-2160-40ca-b127-c7180d010354" class="artist-img">
                    <div class="artist-info"><div class="artist-name">PHARAOH</div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-wrap">
        <div class="n-btn p2"><i class="fa-solid fa-arrow-left"></i></div>
        <div class="n-btn n2"><i class="fa-solid fa-arrow-right"></i></div>
    </div>

    <h2 class="section-label">Partners</h2>
    <div class="marquee-container">
        <div class="marquee-track">
            <img src="https://mobile-review.com/all/wp-content/uploads/2023/07/free-png.ru-462.png">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/61/Zvonko_Digital_Logo.svg/1280px-Zvonko_Digital_Logo.svg.png">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Pornhub-logo.svg/1280px-Pornhub-logo.svg.png">
            <img src="https://dce0b408-c951-4bea-96e5-3180fc41c3e8.selcdn.net/_next/image?url=https%3A%2F%2Fdefst1.gilmon.ru%2Fresources%2Ffs%2Fi%2Fshares%2F72%2F32%2F7232_large_1725620745.jpg&w=3840&q=75">
            <img src="https://mobile-review.com/all/wp-content/uploads/2023/07/free-png.ru-462.png">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/61/Zvonko_Digital_Logo.svg/1280px-Zvonko_Digital_Logo.svg.png">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Pornhub-logo.svg/1280px-Pornhub-logo.svg.png">
            <img src="https://dce0b408-c951-4bea-96e5-3180fc41c3e8.selcdn.net/_next/image?url=https%3A%2F%2Fdefst1.gilmon.ru%2Fresources%2Ffs%2Fi%2Fshares%2F72%2F32%2F7232_large_1725620745.jpg&w=3840&q=75">
        </div>
    </div>

    <footer>© 2026 AURUM MUSIC. ALL RIGHTS RESERVED.</footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script> 
    
    <script>
        // 1. Инициализация плавного скролла (Lenis)
        const lenis = new Lenis();
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // 2. Swiper (Free Mode как в ScrollBooster)
        const swiper = new Swiper(".mySwiper", {
            slidesPerView: "auto",
            freeMode: true,
            grabCursor: true,
            mousewheel: { releaseOnEdges: true },
            navigation: { nextEl: ".n2", prevEl: ".p2" },
        });

        // 3. Модалка
        function toggleModal(s) {
            document.getElementById('m').classList.toggle('active', s);
        }
    </script>
</body>
</html>
