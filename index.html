<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <meta name="description" content="NATIVE — Музыкальный лейбл и надежный партнер на каждом этапе творческого пути.">
    <meta property="og:title" content="NATIVE | Музыкальный лейбл">
    <meta property="og:description" content="Мы предлагаем широкий спектр услуг для артистов: от записи и сведения до съемки клипов и продвижения.">
    <meta property="og:image" content="./logo.png">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#05020a">
    <link rel="canonical" href="https://nativelabel.ru/">

    <title>NATIVE | Музыкальный лейбл</title>

    <link rel="icon" type="image/png" href="./logo.png">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Raleway:wght@700;900&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Raleway:wght@700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<div class="page-wrapper">

    <header class="header">
        <a href="#" class="header-logo" aria-label="NATIVE Главная">
            <img src="./logo.png" alt="NATIVE Logo" class="logo-img">
            <span class="logo-text">NATIVE</span>
        </a>
        <nav class="header-nav">
            <a href="#about">О нас</a>
            <a href="#services">Услуги</a>
            <a href="#artists">Артисты</a>
        </nav>
        <!-- Текст и ссылка подтягиваются из Supabase через content.js -->
        <a href="#" target="_blank" rel="noopener noreferrer" class="btn-primary" aria-label="Отправить демо"></a>
    </header>

    <!-- 1. HERO -->
    <section class="hero" id="about">
        <canvas id="hero-canvas"></canvas>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">NATIVE</h1>
            <!-- Текст подтягивается из Supabase через content.js -->
            <p class="hero-intro"></p>
        </div>
    </section>

    <!-- 2. АРТИСТЫ -->
    <section class="section" id="artists">
        <div class="section-header reveal">
            <h2 class="section-title">
                <i class="fa-solid fa-microphone header-icon" aria-hidden="true"></i> АРТИСТЫ
            </h2>
        </div>
        <!-- Стрелки удалены — навигация только свайпом -->
        <div class="swiper artistSwiper reveal">
            <div class="swiper-wrapper" id="artists-wrapper"></div>
        </div>
    </section>

    <!-- 3. УСЛУГИ -->
    <section class="section" id="services">
        <div class="section-header reveal">
            <h2 class="section-title">
                <i class="fa-solid fa-briefcase header-icon" aria-hidden="true"></i> СПЕКТР УСЛУГ
            </h2>
        </div>
        <div class="services-grid"></div>
    </section>

    <!-- 4. СТАТИСТИКА — перемещена после услуг -->
    <section class="section stats-section" id="stats">
        <!-- id="stats-grid" нужен content.js для динамической загрузки из Supabase -->
        <!-- Карточки ниже — запасной вариант если Supabase недоступен -->
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card reveal">
                <div class="stat-number" data-target="12" data-suffix="+">0</div>
                <div class="stat-label">артистов</div>
            </div>
            <div class="stat-card reveal">
                <div class="stat-number" data-target="120" data-suffix="M+">0</div>
                <div class="stat-label">прослушиваний</div>
            </div>
            <div class="stat-card reveal">
                <div class="stat-number" data-target="300" data-suffix="+">0</div>
                <div class="stat-label">релизов</div>
            </div>
        </div>
    </section>

    <!-- 5. СОЦСЕТИ -->
    <section class="section socials-section reveal">
        <!-- Текст подтягивается из Supabase через content.js -->
        <h2 class="section-title"></h2>
        <div class="social-links">
            <!-- aria-label используется content.js для поиска кнопок — не удалять -->
            <a href="#" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="ВКонтакте">
                <i class="fa-brands fa-vk" aria-hidden="true"></i> ВКонтакте
            </a>
            <!-- Все три кнопки теперь одинаковые — glassmorphism, без выделения Telegram -->
            <a href="#" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="Telegram">
                <i class="fa-brands fa-telegram" aria-hidden="true"></i> Telegram
            </a>
            <a href="#" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="YouTube">
                <i class="fa-brands fa-youtube" aria-hidden="true"></i> YouTube
            </a>
        </div>
    </section>

    <footer>
        <div>© 2026 NATIVE LABEL. ALL RIGHTS RESERVED.</div>
        <div>ДЕМОНСТРАЦИЯ ОФИЦИАЛЬНОГО САЙТА ЛЕЙБЛА</div>
    </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
<script type="module" src="./js/main.js"></script>

</body>
</html>
