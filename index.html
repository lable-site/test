<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <meta name="description" content="NATIVE — Музыкальный лейбл и надежный партнер на каждом этапе творческого пути.">
    <meta property="og:title" content="NATIVE | Музыкальный лейбл">
    <meta property="og:description" content="Мы предлагаем широкий спектр услуг для артистов: от записи и сведения до съемки клипов и продвижения.">
    <meta property="og:image" content="./logo.png">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#05020a">
    <link rel="canonical" href="https://nativelabel.ru/">

    <title>NATIVE | Музыкальный лейбл</title>

    <!-- ЗАДАЧА 5: Правильные favicon теги для чёткого отображения во вкладке -->
    <link rel="icon" type="image/png" sizes="32x32" href="./logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./logo.png">
    <link rel="shortcut icon" href="./logo.png">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Raleway:wght@700;900&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Raleway:wght@700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<div class="page-wrapper">

    <header class="header">
        <a href="#" class="header-logo" aria-label="NATIVE Главная">
            <img src="./logo.png" alt="NATIVE Logo" class="logo-img">
            <span class="logo-text">NATIVE</span>
        </a>
        <nav class="header-nav">
            <a href="#about">О нас</a>
            <a href="#services">Услуги</a>
            <a href="#artists">Артисты</a>
        </nav>
        <!-- Текст и ссылка подтягиваются из Supabase через content.js -->
        <a href="#" target="_blank" rel="noopener noreferrer" class="btn-primary" aria-label="Отправить демо"></a>
    </header>

    <!-- 1. HERO -->
    <section class="hero" id="about">
        <canvas id="hero-canvas"></canvas>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">NATIVE</h1>
            <p class="hero-intro"></p>
        </div>
    </section>

    <!-- 2. АРТИСТЫ -->
    <section class="section artists-section" id="artists">
        <canvas class="stars-canvas-bg"></canvas>

        <div class="section-header reveal">
            <h2 class="section-title">
                <!-- ЗАДАЧА 4: Иконка снаружи span, текст внутри — span обновляется из Supabase -->
                <i class="fa-solid fa-microphone header-icon" aria-hidden="true"></i>
                <span id="title-artists">АРТИСТЫ</span>
            </h2>
        </div>

        <div class="swiper artistSwiper reveal">
            <div class="swiper-wrapper" id="artists-wrapper"></div>
        </div>
    </section>

    <!-- 3. УСЛУГИ -->
    <section class="section" id="services">
        <canvas id="services-canvas"></canvas>

        <div class="section-header reveal">
            <h2 class="section-title">
                <!-- ЗАДАЧА 4: Иконка снаружи span, текст внутри — span обновляется из Supabase -->
                <i class="fa-solid fa-briefcase header-icon" aria-hidden="true"></i>
                <span id="title-services">СПЕКТР УСЛУГ</span>
            </h2>
        </div>
        <div class="services-grid"></div>
    </section>

    <!-- 4. СТАТИСТИКА -->
    <!-- ЗАДАЧА 10: data-density="light" — в StarSystem читается и делает звёзды меньше/тусклее/реже -->
    <section class="section stats-section" id="stats">
        <canvas class="stars-canvas-bg" data-density="light"></canvas>

        <div class="stats-grid" id="stats-grid">
            <div class="stat-card reveal">
                <div class="stat-number" data-target="12" data-suffix="+">0</div>
                <div class="stat-label">артистов</div>
            </div>
            <div class="stat-card reveal">
                <div class="stat-number" data-target="120" data-suffix="M+">0</div>
                <div class="stat-label">прослушиваний</div>
            </div>
            <div class="stat-card reveal">
                <div class="stat-number" data-target="300" data-suffix="+">0</div>
                <div class="stat-label">релизов</div>
            </div>
        </div>
    </section>

    <!-- 5. СОЦСЕТИ -->
    <!-- ЗАДАЧА 7: Хардкод-кнопки удалены. Рендерятся из Supabase через renderSocials() -->
    <section class="section socials-section reveal">
        <canvas class="stars-canvas-bg"></canvas>

        <!-- Текст подтягивается из Supabase через content.js (ключ join_text) -->
        <h2 class="section-title socials-title"></h2>
        <!-- social-links заполняется JS -->
        <div class="social-links" id="social-links-container"></div>
    </section>

    <!-- ЗАДАЧА 6: ID на div-ах футера — обновляются из Supabase через ключи footer_copyright / footer_tagline -->
    <footer>
        <div id="footer-copyright">© 2026 NATIVE LABEL. ALL RIGHTS RESERVED.</div>
        <div id="footer-tagline">ДЕМОНСТРАЦИЯ ОФИЦИАЛЬНОГО САЙТА ЛЕЙБЛА</div>
    </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
<script type="module" src="./js/main.js"></script>

</body>
</html>
