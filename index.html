<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURUM | NEXT GEN LABEL</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700;900&display=swap');

        :root {
            --bg: #000;
            --accent: #fff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--accent); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* HEADER С КНОПКОЙ (СТИЛЬ KOALA) */
        header {
            position: fixed; top: 0; width: 100%; padding: 30px 40px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .logo-text { font-weight: 900; letter-spacing: 5px; font-size: 18px; }
        .btn-drop {
            padding: 10px 20px; border: 1px solid var(--border); border-radius: 100px;
            font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #fff;
            cursor: pointer; transition: 0.3s; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        .btn-drop:hover { background: #fff; color: #000; }

        /* HERO СЕКЦИЯ */
        .hero {
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
        }
        .hero h1 { font-size: clamp(60px, 15vw, 150px); font-weight: 900; letter-spacing: -2px; margin-bottom: 20px; }
        .hero p { max-width: 600px; font-weight: 300; font-size: 18px; opacity: 0.5; line-height: 1.6; padding: 0 20px; }

        /* СЕКЦИИ (ЗАГОЛОВКИ) */
        .section-label {
            padding: 100px 40px 20px; font-size: 10px; text-transform: uppercase; 
            letter-spacing: 5px; opacity: 0.3; text-align: center;
        }

        /* АРТИСТЫ (ULTRA-SMOOTH) */
        .swiper { width: 100%; padding: 50px 0; }
        .swiper-slide { width: 350px; transition: 0.5s; }
        .artist-wrap {
            width: 100%; height: 500px; position: relative; border-radius: 15px;
            overflow: hidden; background: #111; transform: translateZ(0);
        }
        .artist-wrap img { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: grayscale(1); transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .artist-overlay {
            position: absolute; bottom: 0; width: 100%; height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex; align-items: flex-end; justify-content: center; padding-bottom: 30px;
        }
        .artist-name { font-weight: 700; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; }

        .swiper-slide-active .artist-wrap img { filter: grayscale(0) scale(1.1); }
        .swiper-slide-active .artist-wrap { border: 1px solid var(--border); }

        /* ПАРТНЕРЫ (БЕСШОВНЫЙ ЛУП) */
        .marquee {
            width: 100%; overflow: hidden; padding: 60px 0;
            mask-image: linear-gradient(to right, transparent, #000 15%, #000 85%, transparent);
        }
        .marquee-inner { display: flex; width: max-content; animation: loop 30s linear infinite; }
        .marquee-inner img { height: 40px; margin: 0 50px; opacity: 0.5; transition: 0.3s; }
        .marquee-inner img:hover { opacity: 1; }
        @keyframes loop { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* МОДАЛКА (ФИКС ПОД МОБИЛКИ) */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #0a0a0a; border: 1px solid var(--border);
            padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center;
        }
        .modal-content h2 { margin-bottom: 20px; font-size: 24px; }
        .modal-content p { opacity: 0.6; font-size: 14px; margin-bottom: 30px; line-height: 1.6; }

        footer { padding: 80px 40px; text-align: center; font-size: 10px; opacity: 0.2; letter-spacing: 5px; }

    </style>
</head>
<body>

    <header>
        <div class="logo-text">AURUM</div>
        <button class="btn-drop" onclick="document.getElementById('m').classList.add('active')">Send Demo</button>
    </header>

            <a href="mailto:demo@aurum.label" class="btn-drop" style="display:inline-block; text-decoration:none;">Email Us</a>

    <section class="hero">

            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Pornhub-logo.svg/1280px-Pornhub-logo.svg.png">

    </div>

    <footer>AURUM WORLDWIDE © 2026</footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper(".mySwiper", {
            effect: "coverflow",
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: "auto",
            loop: true,
            speed: 800,
            autoplay: { delay: 5000 },
            coverflowEffect: { rotate: 0, stretch: 0, depth: 100, modifier: 2, slideShadows: false },
        });
    </script>
</body>
</html>
