<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PREMIUM LABEL | DIGITAL EXPERIENCE</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ИМПОРТ ШРИФТА INTER */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;700;900&display=swap');

        :root {
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.07);
            --accent: #ffffff;
            --transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* ПЛАВНОЕ ПОЯВЛЕНИЕ ПРИ СКРОЛЛЕ */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: var(--transition);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 1. HERO СЕКЦИЯ (ГЛАВНЫЙ ЭКРАН) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }
        .hero-logo {
            width: 100px;
            height: 100px;
            background: #fff;
            border-radius: 24px;
            margin-bottom: 40px;
            box-shadow: 0 0 60px rgba(255,255,255,0.05);
            /* Анимация пульсации для дорогого вида */
            animation: pulse 4s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .hero-title {
            font-size: clamp(24px, 5vw, 42px);
            font-weight: 900;
            letter-spacing: 18px;
            text-transform: uppercase;
            text-indent: 18px; /* Компенсация отступа справа */
        }

        /* ОБЩИЕ ПРАВИЛА ДЛЯ СЕКЦИЙ */
        .section {
            padding: 140px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .section-title {
            text-align: center;
            font-size: 11px;
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0.3;
            margin-bottom: 60px;
            font-weight: 300;
        }

        /* 2. БЛОК "О НАС" (GLASS CARD) */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 80px 40px;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }
        .glass-card p {
            font-size: clamp(18px, 3vw, 24px);
            line-height: 1.6;
            font-weight: 200;
            color: rgba(255,255,255,0.8);
        }
        .glass-card b { font-weight: 700; color: #fff; }

        /* 3. СЛАЙДЕР АРТИСТОВ */
        .swiper { width: 100%; padding: 40px 0 100px; }
        .swiper-slide { width: auto; }
        
        .artist-card {
            width: 320px;
            height: 480px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            transition: var(--transition);
        }
        .artist-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) brightness(0.6);
            transition: 1s ease;
        }
        .artist-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }
        .artist-name {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Эффект при фокусе на слайде */
        .swiper-slide-active .artist-card { border-color: rgba(255,255,255,0.3); transform: scale(1.05); }
        .swiper-slide-active .artist-photo { filter: grayscale(0) brightness(1); }

        /* 4. ПАРТНЕРЫ */
        .partners-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 2px; /* Тонкие линии между партнерами */
            background: var(--glass-border);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            overflow: hidden;
        }
        .partner-item {
            height: 120px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
            transition: 0.5s;
        }
        .partner-item:hover { opacity: 1; }
        .partner-placeholder { width: 60px; height: 20px; background: #fff; border-radius: 2px; }

        /* 5. ФУТЕР */
        .footer {
            padding: 100px 20px;
            text-align: center;
            background: linear-gradient(to bottom, transparent, #0a0a0a);
        }
        .social-links { display: flex; justify-content: center; gap: 40px; margin-bottom: 50px; }
        .social-links a { color: #fff; font-size: 24px; opacity: 0.4; transition: 0.3s; text-decoration: none; }
        .social-links a:hover { opacity: 1; transform: translateY(-5px); }
        .copyright { font-size: 10px; letter-spacing: 3px; opacity: 0.2; text-transform: uppercase; }

    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-logo"></div>
        <h1 class="hero-title">LABEL NAME</h1>
    </section>

    <section class="section reveal">
        <div class="glass-card">
            <p><b>LABEL NAME</b> — это экосистема, где музыка обретает форму. Мы создаем будущее индустрии, объединяя <b>бескомпромиссное качество</b> и визуальную эстетику.</p>
        </div>
    </section>

    <section class="section reveal">
        <h2 class="section-title">Артисты</h2>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <div class="artist-card">
                        <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?q=80&w=600" class="artist-photo">
                        <div class="artist-info">
                            <div class="artist-name">Artist One</div>
                        </div>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="artist-card">
                        <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?q=80&w=600" class="artist-photo">
                        <div class="artist-info">
                            <div class="artist-name">Artist Two</div>
                        </div>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="artist-card">
                        <img src="https://images.unsplash.com/photo-1520110120385-4267e72159ac?q=80&w=600" class="artist-photo">
                        <div class="artist-info">
                            <div class="artist-name">Artist Three</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="section reveal">
        <h2 class="section-title">Партнеры</h2>
        <div class="partners-grid">
            <div class="partner-item"><div class="partner-placeholder"></div></div>
            <div class="partner-item"><div class="partner-placeholder"></div></div>
            <div class="partner-item"><div class="partner-placeholder"></div></div>
            <div class="partner-item"><div class="partner-placeholder"></div></div>
        </div>
    </section>

    <footer class="footer">
        <div class="social-links">
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-telegram"></i></a>
            <a href="#"><i class="fa-regular fa-envelope"></i></a>
        </div>
        <div class="copyright">© 2026 LABEL NAME • ALL RIGHTS RESERVED</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        /* ИНИЦИАЛИЗАЦИЯ СЛАЙДЕРА */
        const swiper = new Swiper(".mySwiper", {
            effect: "coverflow",
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: "auto",
            speed: 800,
            coverflowEffect: {
                rotate: 10,
                stretch: 0,
                depth: 200,
                modifier: 1,
                slideShadows: false,
            },
            loop: true,
        });

        /* СКРИПТ ПОЯВЛЕНИЯ ПРИ СКРОЛЛЕ */
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
